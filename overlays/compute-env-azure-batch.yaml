overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Azure Batch Compute Environment Overlay
  version: 0.0.1

# ==============================================================================
# AZURE BATCH COMPUTE ENVIRONMENT RESOURCE OVERLAY
# ==============================================================================
#
# Defines the `seqera_azure_batch_ce` resource — the Azure Batch parallel of
# `seqera_aws_batch_ce` and `seqera_gcp_batch_ce`. Splits Azure Batch out of
# the generic `seqera_compute_env` resource into its own first-class entity.
#
# Field-level descriptions for `AzBatchConfig` live in the upstream OpenAPI
# spec and `overlays/compute-env.yaml` (shared with the generic resource);
# this overlay only adds the entity, the path operations, and resource-level
# annotations.
#
# TERRAFORM EXAMPLE:
# ------------------
#
# resource "seqera_azure_batch_ce" "basic" {
#   name           = "azure-batch-basic"
#   workspace_id   = 123
#   platform       = "azure-batch"
#   credentials_id = seqera_azure_credential.main.credentials_id
#
#   config = {
#     region   = "eastus"
#     work_dir = "az://my-container/work"
#   }
# }
#
# ==============================================================================

actions:
  - target: $.paths
    update:
      "/compute-envs#azure-batch":
        post:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureBatchCE#create
          x-speakeasy-name-override: CreateAzureBatchCE
          summary: Create Azure Batch compute environment
          description: Creates a new Azure Batch compute environment. Append `?workspaceId` to create the environment in a workspace context.
          x-speakeasy-retries:
            strategy: backoff
            backoff:
              initialInterval: 5000
              maxInterval: 5000
              maxElapsedTime: 30000
              exponent: 1.0
            statusCodes:
              - 429
              - 500
              - 502
              - 503
              - 504
          tags:
            - compute-envs
          operationId: CreateAzureBatchCE
          parameters:
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
          requestBody:
            description: Azure Batch compute environment create request
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CreateAzureBatchCERequest"
            required: true
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/CreateAzureBatchCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "409":
              description: Conflict - resource already exists
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []

      "/compute-envs/{computeEnvId}#azure-batch":
        get:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureBatchCE#read
          # 400/404 = soft-deleted/missing CE; 403 stays a real error so auth issues remain visible.
          x-speakeasy-entity-missing-codes:
            - 400
            - 404
          x-speakeasy-name-override: DescribeAzureBatchCE
          summary: Describe Azure Batch compute environment
          description: Retrieves the details of the Azure Batch compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DescribeAzureBatchCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
            - name: attributes
              in: query
              description: "Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted."
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComputeEnvQueryAttribute"
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/DescribeAzureBatchCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "404":
              description: Compute environment not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []
        delete:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureBatchCE#delete
          x-speakeasy-name-override: DeleteAzureBatchCE
          summary: Delete Azure Batch compute environment
          description: Deletes the Azure Batch compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DeleteAzureBatchCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
          responses:
            "204":
              description: OK - No content
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
          security:
            - BearerAuth: []

  - target: $.components.schemas
    update:
      # Azure Batch compute environment schema
      AzureBatchCE_ComputeConfig:
        x-speakeasy-entity: AzureBatchCE
        x-speakeasy-entity-version: 1
        x-speakeasy-entity-description: |
          Manage Azure Batch compute environments in Seqera platform.

          Azure Batch compute environments execute Nextflow pipelines on Azure Batch
          using Azure-managed pools of VMs. Use this resource for batch-style
          workloads where Azure Batch schedules and manages the underlying compute
          instances.
        required:
          - config
          - name
          - platform
          - credentialsId
        type: object
        properties:
          credentialsId:
            type: string
            description: Azure credentials identifier
          orgId:
            type: integer
            format: int64
            readOnly: true
            x-speakeasy-param-readonly: true
          workspaceId:
            type: integer
            format: int64
            description: Workspace numeric identifier
          id:
            type: string
            description: Unique identifier for the compute environment
            x-speakeasy-param-readonly: true
          name:
            maxLength: 100
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
            description: A unique name for this compute environment. Use only alphanumeric, dash, and underscore characters.
            x-speakeasy-param-force-new: true
          description:
            type: string
            description: Optional description of the compute environment
            x-speakeasy-param-computed: false
          platform:
            type: string
            enum:
              - azure-batch
            description: Azure platform type
            x-speakeasy-param-optional: false
          status:
            type: string
            description: Compute environment status
            x-speakeasy-param-readonly: true
          dateCreated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was created
            x-speakeasy-param-readonly: true
          lastUpdated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last updated
            x-speakeasy-param-readonly: true
          lastUsed:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last used
            x-speakeasy-param-readonly: true
          deleted:
            type: boolean
            description: Flag indicating if the compute environment has been deleted
            x-speakeasy-param-readonly: true
          config:
            description: Azure Batch compute environment configuration
            $ref: '#/components/schemas/AzBatchConfig'

      # Azure Batch request/response schemas
      CreateAzureBatchCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureBatchCE_ComputeConfig'
          labelIds:
            type: array
            items:
              type: integer
              format: int64

      CreateAzureBatchCEResponse:
        type: object
        properties:
          computeEnvId:
            type: string

      UpdateAzureBatchCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureBatchCE_ComputeConfig'

      DescribeAzureBatchCEResponse:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureBatchCE_ComputeConfig'

      ListAzureBatchCEsResponse:
        type: object
        properties:
          computeEnvs:
            type: array
            items:
              $ref: '#/components/schemas/AzureBatchCE_ComputeConfig'
          totalSize:
            type: integer
            format: int64

  # ============================================================================
  # FORCE-REPLACEMENT ON TOP-LEVEL FIELDS
  # ============================================================================
  # NOTE: name field does NOT have force-new — it can be updated in-place.
  # All other top-level fields force replacement on change.

  - target: $.components.schemas.AzureBatchCE_ComputeConfig.properties.description
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureBatchCE_ComputeConfig.properties.platform
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureBatchCE_ComputeConfig.properties.credentialsId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureBatchCE_ComputeConfig.properties.workspaceId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureBatchCE_ComputeConfig.properties.config
    update:
      x-speakeasy-param-force-new: true

  # ============================================================================
  # AZBATCHFORGECONFIG LIST-OF-STRING CUSTOM TYPES
  # ============================================================================
  # Without this Speakeasy generates `[]types.String`, which the framework
  # cannot decode when the whole list is unknown at plan time (e.g. fed from a
  # data source).

  - target: $.components.schemas.AzBatchForgeConfig.properties.containerRegIds
    update:
      description: |
        List of Azure Container Registry IDs whose images compute jobs may pull.
      x-speakeasy-param-force-new: true
      x-speakeasy-terraform-custom-type:
        imports:
          - github.com/hashicorp/terraform-plugin-framework/types/basetypes
        schemaType: "basetypes.ListType{ElemType: basetypes.StringType{}}"
        valueType: basetypes.ListValue
