overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: GCP Cloud Compute Environment Overlay
  version: 0.0.1

# ==============================================================================
# GCP CLOUD COMPUTE ENVIRONMENT RESOURCE OVERLAY
# ==============================================================================
#
# Defines the `seqera_gcp_cloud_ce` resource — the Google Cloud platform
# parallel of `seqera_aws_cloud_ce` (planned). Splits Google Cloud out of the
# generic `seqera_compute_env` resource into its own first-class entity.
#
# Field-level descriptions for `GoogleCloudConfig` live in
# `overlays/compute-env.yaml` (shared with the generic resource); this overlay
# only adds the entity, the path operations, and resource-level annotations.
#
# TERRAFORM EXAMPLE:
# ------------------
#
# resource "seqera_gcp_cloud_ce" "basic" {
#   name           = "gcp-cloud-basic"
#   workspace_id   = 123
#   platform       = "google-cloud"
#   credentials_id = seqera_google_credential.main.credentials_id
#
#   config = {
#     region        = "us-central1"
#     work_dir      = "gs://my-bucket/work"
#     project_id    = "my-gcp-project"
#     instance_type = "n1-standard-4"
#   }
# }
#
# ==============================================================================

actions:
  - target: $.paths
    update:
      "/compute-envs#gcp-cloud":
        post:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: GCPCloudCE#create
          x-speakeasy-name-override: CreateGCPCloudCE
          summary: Create GCP Cloud compute environment
          description: Creates a new Google Cloud compute environment. Append `?workspaceId` to create the environment in a workspace context.
          x-speakeasy-retries:
            strategy: backoff
            backoff:
              initialInterval: 5000
              maxInterval: 5000
              maxElapsedTime: 30000
              exponent: 1.0
            statusCodes:
              - 429
              - 500
              - 502
              - 503
              - 504
          tags:
            - compute-envs
          operationId: CreateGCPCloudCE
          parameters:
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
          requestBody:
            description: GCP Cloud compute environment create request
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CreateGCPCloudCERequest"
            required: true
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/CreateGCPCloudCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "409":
              description: Conflict - resource already exists
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []

      "/compute-envs/{computeEnvId}#gcp-cloud":
        get:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: GCPCloudCE#read
          # 400/404 = soft-deleted/missing CE; 403 stays a real error so auth issues remain visible.
          x-speakeasy-entity-missing-codes:
            - 400
            - 404
          x-speakeasy-name-override: DescribeGCPCloudCE
          summary: Describe GCP Cloud compute environment
          description: Retrieves the details of the Google Cloud compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DescribeGCPCloudCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
            - name: attributes
              in: query
              description: "Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted."
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComputeEnvQueryAttribute"
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/DescribeGCPCloudCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "404":
              description: Compute environment not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []
        delete:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: GCPCloudCE#delete
          x-speakeasy-name-override: DeleteGCPCloudCE
          summary: Delete GCP Cloud compute environment
          description: Deletes the Google Cloud compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DeleteGCPCloudCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
          responses:
            "204":
              description: OK - No content
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
          security:
            - BearerAuth: []

  - target: $.components.schemas
    update:
      # GCP Cloud compute environment schema
      GCPCloudCE_ComputeConfig:
        x-speakeasy-entity: GCPCloudCE
        x-speakeasy-entity-version: 1
        x-speakeasy-entity-description: |
          Manage Google Cloud compute environments in Seqera platform.

          GCP Cloud compute environments execute Nextflow pipelines directly on
          Google Compute Engine VMs managed by Seqera. Use this resource for
          long-running or interactive workloads where Seqera provisions and manages
          the underlying compute instances directly (rather than via Google Batch).
        required:
          - config
          - name
          - credentialsId
        type: object
        properties:
          credentialsId:
            type: string
            description: Google Cloud credentials identifier
          orgId:
            type: integer
            format: int64
            readOnly: true
            x-speakeasy-param-readonly: true
          workspaceId:
            type: integer
            format: int64
            description: Workspace numeric identifier
          id:
            type: string
            description: Unique identifier for the compute environment
            x-speakeasy-param-readonly: true
          name:
            maxLength: 100
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
            description: A unique name for this compute environment. Use only alphanumeric, dash, and underscore characters.
            x-speakeasy-param-force-new: true
          description:
            type: string
            description: Optional description of the compute environment
            x-speakeasy-param-computed: false
          platform:
            type: string
            enum:
              - google-cloud
            default: google-cloud
            description: GCP platform type. Always "google-cloud" for this resource — set by the provider, not user-configurable.
            x-speakeasy-param-readonly: true
          status:
            type: string
            description: Compute environment status
            x-speakeasy-param-readonly: true
          dateCreated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was created
            x-speakeasy-param-readonly: true
          lastUpdated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last updated
            x-speakeasy-param-readonly: true
          lastUsed:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last used
            x-speakeasy-param-readonly: true
          deleted:
            type: boolean
            description: Flag indicating if the compute environment has been deleted
            x-speakeasy-param-readonly: true
          config:
            description: Google Cloud compute environment configuration
            $ref: '#/components/schemas/GoogleCloudConfig'

      # GCP Cloud request/response schemas
      CreateGCPCloudCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/GCPCloudCE_ComputeConfig'
          labelIds:
            type: array
            items:
              type: integer
              format: int64

      CreateGCPCloudCEResponse:
        type: object
        properties:
          computeEnvId:
            type: string

      UpdateGCPCloudCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/GCPCloudCE_ComputeConfig'

      DescribeGCPCloudCEResponse:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/GCPCloudCE_ComputeConfig'

      ListGCPCloudCEsResponse:
        type: object
        properties:
          computeEnvs:
            type: array
            items:
              $ref: '#/components/schemas/GCPCloudCE_ComputeConfig'
          totalSize:
            type: integer
            format: int64

  # ============================================================================
  # FORCE-REPLACEMENT ON TOP-LEVEL FIELDS
  # ============================================================================
  # NOTE: name field does NOT have force-new — it can be updated in-place.
  # All other top-level fields force replacement on change.

  - target: $.components.schemas.GCPCloudCE_ComputeConfig.properties.description
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.GCPCloudCE_ComputeConfig.properties.platform
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.GCPCloudCE_ComputeConfig.properties.credentialsId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.GCPCloudCE_ComputeConfig.properties.workspaceId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.GCPCloudCE_ComputeConfig.properties.config
    update:
      x-speakeasy-param-force-new: true

  # Plan-time soft-warn when pre/post-run scripts exceed Platform Cloud's
  # 1024-byte limit. Enterprise installs can raise the limit via platform
  # configuration, so this stays a Warning rather than an Error.
  - target: $.components.schemas.GoogleCloudConfig.properties.preRunScript
    update:
      x-speakeasy-plan-validators: RunScriptSizeValidator
  - target: $.components.schemas.GoogleCloudConfig.properties.postRunScript
    update:
      x-speakeasy-plan-validators: RunScriptSizeValidator
