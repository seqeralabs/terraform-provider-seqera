overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Azure Cloud Credentials Overlay
  version: 0.0.0
actions:
- target: $.paths
  update:
    /credentials#azure-cloud:
      post:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCloudCredential#create
        x-speakeasy-name-override: CreateAzureCloudCredentials
        summary: Create Azure Cloud credentials
        description: Creates new Azure Cloud (SingleVM) credentials authenticating via an Entra service principal in a workspace.
        tags:
        - credentials
        operationId: CreateAzureCloudCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure Cloud credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAzureCloudCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateAzureCloudCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#azure-cloud:
      get:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCloudCredential#read
        x-speakeasy-name-override: DescribeAzureCloudCredentials
        summary: Describe Azure Cloud credentials
        description: Retrieves the details of the Azure Cloud credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeAzureCloudCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeAzureCloudCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCloudCredential#update
        x-speakeasy-name-override: UpdateAzureCloudCredentials
        summary: Update Azure Cloud credentials
        description: Updates the details of the Azure Cloud credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateAzureCloudCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure Cloud credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAzureCloudCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCloudCredential#delete
        x-speakeasy-name-override: DeleteAzureCloudCredentials
        summary: Delete Azure Cloud credentials
        description: Deletes the Azure Cloud credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteAzureCloudCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Running jobs block the deletion of this credentials
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteCredentialsConflictResponse'
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    AzureCloudCredential:
      x-speakeasy-entity: AzureCloudCredential
      x-speakeasy-entity-version: 1
      x-speakeasy-terraform-resource-name: azure_cloud_credential
      x-speakeasy-entity-description: |
        Manage Azure Cloud (SingleVM) credentials authenticated via a
        Microsoft Entra service principal. Use this credential type for
        Azure Cloud compute environments, which run Nextflow directly on
        Azure VMs managed by Seqera Forge (no Azure Batch involvement).
        Storage access is brokered through the same service principal,
        so no separate storage key is required.

        For Azure Batch with Entra service-principal auth, use
        `seqera_azure_entra_credential`; for Azure Batch with shared-key
        auth, use `seqera_azure_credential`.
      x-speakeasy-transform-from-api:
        jq: '. + { subscription_id: .keys.subscriptionId, storage_name: .keys.storageName, tenant_id: .keys.tenantId, client_id: .keys.clientId, client_secret: .keys.clientSecret, credentials_id: .id } | del(.keys)'
      x-speakeasy-transform-to-api:
        jq: '. + { keys: { discriminator: "azure-cloud", subscriptionId: .subscription_id, storageName: .storage_name, tenantId: .tenant_id, clientId: .client_id, clientSecret: .client_secret } } | del(.subscription_id, .storage_name, .tenant_id, .client_id, .client_secret, .credentials_id)'
      required:
      - name
      - subscription_id
      - storage_name
      - tenant_id
      - client_id
      - client_secret
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentials_id:
          type: string
          description: Alias of `id`. Retained for backwards compatibility with existing customer HCL — both fields hold the same value.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - azure-cloud
          default: azure-cloud
          description: Cloud provider type. Always set by the provider for this resource.
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        subscription_id:
          type: string
          description: Azure subscription ID where Forge provisions VMs.
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
        storage_name:
          type: string
          description: Azure Blob Storage account name used for work_dir.
          example: myazurestorage
          x-speakeasy-param-computed: false
        tenant_id:
          type: string
          description: Microsoft Entra tenant ID.
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
        client_id:
          type: string
          description: Microsoft Entra service principal client (application) ID.
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
        client_secret:
          type: string
          description: Microsoft Entra service principal client secret.
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: YourEntraClientSecretHere
    CreateAzureCloudCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCloudCredential'
    CreateAzureCloudCredentialsResponse:
      type: object
      properties:
        credentialsId:
          type: string
    UpdateAzureCloudCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCloudCredential'
    DescribeAzureCloudCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCloudCredential'
- target: $.components.schemas.AzureCloudCredential.properties.description
  remove: true
- target: $.components.schemas.AzureCloudCredential.properties.baseUrl
  remove: true
- target: $.components.schemas.AzureCloudCredential.properties.category
  remove: true
- target: $.components.schemas.AzureCloudCredential.properties.client_secret
  update:
    writeOnly: true
- target: $["paths"]["/credentials#azure-cloud"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
