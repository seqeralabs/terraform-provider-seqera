overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: GitLab Credentials Overlay
  version: 0.0.1
actions:
- target: $.paths
  update:
    /credentials#gitlab:
      post:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: GitlabCredential#create
        x-speakeasy-name-override: CreateGitlabCredentials
        summary: Create GitLab credentials
        description: Creates new GitLab credentials in a user context. Append `?workspaceId` to create the credentials in
          a workspace context.
        tags:
        - credentials
        operationId: CreateGitlabCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: GitLab credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGitlabCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateGitlabCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#gitlab:
      get:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: GitlabCredential#read
        x-speakeasy-name-override: DescribeGitlabCredentials
        summary: Describe GitLab credentials
        description: Retrieves the details of the GitLab credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeGitlabCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeGitlabCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: GitlabCredential#update
        x-speakeasy-name-override: UpdateGitlabCredentials
        summary: Update GitLab credentials
        description: Updates the details of the GitLab credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateGitlabCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: GitLab credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateGitlabCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: GitlabCredential#delete
        x-speakeasy-name-override: DeleteGitlabCredentials
        summary: Delete GitLab credentials
        description: Deletes the GitLab credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteGitlabCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    GitlabCredential:
      x-speakeasy-entity: GitlabCredential
      x-speakeasy-entity-version: 1
      x-speakeasy-terraform-resource-name: gitlab_credential
      x-speakeasy-entity-description: 'Manage GitLab credentials in Seqera platform using this resource. **Note:** This is a workspace-scoped resource. To manage user-context (personal) credentials, use the generic `seqera_credential` resource.


        GitLab credentials store authentication information for accessing GitLab

        repositories within the Seqera Platform workflows.

        '
      x-speakeasy-transform-from-api:
        jq: '. + { username: .keys.username, token: .keys.token, credentials_id: .id } | del(.keys)'
      x-speakeasy-transform-to-api:
        jq: '. + { keys: { username: .username, token: .token } } | del(.username, .token, .credentials_id)'
      required:
      - name
      - username
      - token
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentials_id:
          type: string
          description: Alias of `id`. Retained for backwards compatibility with existing customer HCL — both fields hold the same value.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - gitlab
          default: gitlab
          description: Cloud provider type. Always set by the provider for this resource.
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        baseUrl:
          type: string
          description: 'Repository base URL (optional, recommended). When multiple GitLab credentials exist in a workspace, Seqera selects the credential whose `base_url` is the longest prefix of the target repository URL; ties are broken by most recently updated. If no credential has a `base_url`, the most recently updated GitLab credential is used. For self-hosted GitLab, set this to the server URL. Example: https://gitlab.com/seqeralabs'
          example: https://gitlab.com/seqeralabs
          x-speakeasy-name-override: base_url
          x-speakeasy-param-computed: false
        username:
          type: string
          description: GitLab account username associated with the access token.
          example: gitlab-user
        token:
          type: string
          description: GitLab access token (Personal, Group, or Project). Used by Seqera to authenticate against the GitLab API. Recommended scopes are `api`, `read_api`, and `read_repository`, though the backend does not strictly enforce them. Sensitive.
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: glpat-xxxxxxxxxxxxxxxxxxxx
    CreateGitlabCredentialsRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/GitlabCredential'
    CreateGitlabCredentialsResponse:
      type: object
      x-speakeasy-transform-from-api:
        jq: '. + { id: .credentialsId }'
      properties:
        id:
          type: string
          description: Alias of `credentials_id` for Terraform convention.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentialsId:
          type: string
    UpdateGitlabCredentialsRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/GitlabCredential'
    DescribeGitlabCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/GitlabCredential'
- target: $.components.schemas.GitlabCredential.properties.description
  remove: true
- target: $.components.schemas.GitlabCredential.properties.category
  remove: true
- target: $.components.schemas.GitlabCredential.properties.token
  update:
    writeOnly: true
- target: $["paths"]["/credentials#gitlab"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
