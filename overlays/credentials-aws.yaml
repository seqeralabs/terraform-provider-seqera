overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: AWS Credentials Overlay
  version: 0.0.1
actions:
- target: $.paths
  update:
    /credentials#aws:
      post:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource: AWSCredential#create#1
        x-speakeasy-name-override: CreateAWSCredentials
        summary: Create AWS credentials
        description: Creates new AWS credentials in a user context. Append `?workspaceId` to create the credentials in a workspace
          context.
        tags:
        - credentials
        operationId: CreateAWSCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        - name: useExternalId
          in: query
          description: Generate External ID for AWS credentials (requires IAM Role ARN)
          schema:
            type: boolean
        requestBody:
          description: AWS credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAWSCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateAWSCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#aws:
      get:
        x-speakeasy-entity-operation:
          terraform-datasource: null
          terraform-resource:
          - AWSCredential#read
          - AWSCredential#create#2
        x-speakeasy-name-override: DescribeAWSCredentials
        summary: Describe AWS credentials
        description: Retrieves the details of the AWS credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeAWSCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeAWSCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AWSCredential#update
        x-speakeasy-name-override: UpdateAWSCredentials
        summary: Update AWS credentials
        description: Updates the details of the AWS credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateAWSCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        - name: useExternalId
          in: query
          description: Generate External ID for AWS credentials (requires IAM Role ARN)
          schema:
            type: boolean
        requestBody:
          description: AWS credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAWSCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AWSCredential#delete
        x-speakeasy-name-override: DeleteAWSCredentials
        summary: Delete AWS credentials
        description: Deletes the AWS credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteAWSCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        - name: checked
          in: query
          description: If set credentials deletion will be blocked by running jobs that depend on them
          schema:
            type: boolean
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Running jobs block the deletion of this credentials
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteCredentialsConflictResponse'
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    AWSCredential:
      x-speakeasy-entity: AWSCredential
      x-speakeasy-entity-version: 1
      x-speakeasy-entity-description: |
        **Note:** This is a workspace-scoped resource. To manage user-context (personal) credentials, use the generic `seqera_credential` resource.

        Manage AWS credentials in Seqera platform using this resource.

        AWS credentials store authentication information for accessing AWS services
        within the Seqera Platform workflows.
      x-speakeasy-transform-from-api:
        jq: '. + { access_key: .keys.accessKey, secret_key: .keys.secretKey, assume_role_arn: .keys.assumeRoleArn, mode: .keys.mode, external_id: .keys.externalId, credentials_id: .id } | del(.keys)'
      x-speakeasy-transform-to-api:
        jq: '. + { keys: { accessKey: .access_key, secretKey: .secret_key, assumeRoleArn: .assume_role_arn, mode: .mode, externalId: .external_id } } | del(.access_key, .secret_key, .assume_role_arn, .mode, .external_id, .credentials_id)'
      required:
      - name
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentials_id:
          type: string
          description: Alias of `id`. Retained for backwards compatibility with existing customer HCL — both fields hold the same value.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - aws
          default: aws
          description: Cloud provider type. Always set by the provider for this resource.
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        access_key:
          type: string
          minLength: 16
          maxLength: 128
          pattern: ^(AKIA|ASIA|AIDA)[A-Z0-9]{16,}$
          description: AWS access key ID. Must start with AKIA (standard) or ASIA (temporary). Required unless assume_role_arn is provided.
          example: AKIAIOSFODNN7EXAMPLE
          x-speakeasy-param-computed: false
          x-speakeasy-param-optional: true
          x-speakeasy-plan-validators: AWSCredentialKeysValidator
        secret_key:
          type: string
          minLength: 40
          description: AWS secret access key (sensitive). Must be at least 40 characters. Required unless assume_role_arn is provided.
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          x-speakeasy-param-optional: true
          example: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          x-speakeasy-plan-validators: AWSCredentialKeysValidator
        assume_role_arn:
          type: string
          pattern: ^arn:aws:iam::[0-9]{12}:role/.+$
          description: 'IAM role ARN to assume. Format: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME. Either this or both access_key and secret_key must be provided.'
          example: arn:aws:iam::123456789012:role/SeqeraRole
          x-speakeasy-param-computed: false
          x-speakeasy-param-optional: true
          x-speakeasy-plan-validators: AWSCredentialKeysValidator
        mode:
          $ref: '#/components/schemas/AwsCredentialsMode'
          description: 'Authentication mode: "keys" for access key/secret key, "role" for IAM role assumption.'
          x-speakeasy-param-optional: true
        external_id:
          type: string
          description: External ID for cross-account IAM role assumption. Generated by the platform when useExternalId is enabled.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-sensitive: true
    CreateAWSCredentialsRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AWSCredential'
    CreateAWSCredentialsResponse:
      type: object
      properties:
        credentialsId:
          type: string
    UpdateAWSCredentialsRequest:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AWSCredential'
    DescribeAWSCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AWSCredential'
- target: $.components.schemas.AWSCredential.properties.description
  remove: true
- target: $.components.schemas.AWSCredential.properties.baseUrl
  remove: true
- target: $.components.schemas.AWSCredential.properties.category
  remove: true
- target: $["paths"]["/credentials/{credentialsId}#aws"]["delete"]["parameters"][?(@.name == "checked")]
  remove: true
- target: $.components.schemas.AWSCredential.properties.secret_key
  update:
    writeOnly: true
- target: $.components.schemas.AWSCredential.properties.assume_role_arn
  update:
    writeOnly: true
- target: $["paths"]["/credentials#aws"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
