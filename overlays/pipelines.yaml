overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Pipelines Overlay
  version: 0.0.0

# ==============================================================================
# PIPELINES RESOURCE OVERLAY
# ==============================================================================
#
# Manages Nextflow pipeline definitions and configurations in Seqera Platform.
# Pipelines define reusable workflow templates with parameters, compute
# environment settings, and execution configurations for scalable bioinformatics
# and data processing workflows.
#
# TERRAFORM EXAMPLES:
# -------------------
#
# Example 1: Pipeline with explicit work_dir
# resource "seqera_pipeline" "basic" {
#   workspace_id = seqera_workspace.main.id
#   name = "rna-seq-analysis"
#   launch = {
#     pipeline       = "https://github.com/nf-core/rnaseq"
#     compute_env_id = seqera_compute_env.aws.compute_env.id
#     work_dir       = "s3://my-bucket/work"
#     revision       = "main"
#   }
# }
#
# Example 2: Pipeline referencing work_dir from the compute environment
# resource "seqera_pipeline" "from_ce" {
#   workspace_id = seqera_workspace.main.id
#   name = "genomics-pipeline"
#   launch = {
#     pipeline       = "https://github.com/nf-core/sarek"
#     compute_env_id = seqera_compute_env.aws.compute_env.id
#     work_dir       = seqera_compute_env.aws.compute_env.config.aws_batch.work_dir
#     revision       = "main"
#   }
# }
#
# ==============================================================================

actions:
  # ============================================================================
  # ENTITY CONFIGURATION
  # ============================================================================

  # Entity schema configuration for Pipelines
  - target: $.components.schemas.PipelineDbDto
    update:
      x-speakeasy-entity: Pipeline
      x-speakeasy-entity-description: |
        Manage saved pipeline definitions on the Seqera Platform Launchpad.

        A `seqera_pipeline` is a reusable launch template — repository,
        revision, default parameters, and a default compute environment —
        that users can launch on demand from the UI or API.

        Reach for `seqera_workflows` instead when Terraform itself should
        trigger an individual workflow run (for example, a validation
        launch after a compute environment change).
      description: |
        Represents a pipeline configuration in the Seqera Platform.
        Contains pipeline metadata, configuration settings, and execution parameters
        for Nextflow workflows.

  - target: $.components.schemas.CreatePipelineResponse
    update:
      x-speakeasy-entity: Pipelines

  # ============================================================================
  # ENTITY OPERATIONS (CRUD)
  # ============================================================================

  # CREATE - POST /pipelines
  - target: $.paths["/pipelines"].post
    update:
      x-speakeasy-entity-operation:
        terraform-datasource: null

        terraform-resource: Pipeline#create

  # READ - GET /pipelines/{pipelineId} (step 1: top-level metadata)
  - target: $.paths["/pipelines/{pipelineId}"].get
    update:
      x-speakeasy-entity-operation:
        terraform-datasource: null

        terraform-resource: Pipeline#read#1

  # READ - GET /pipelines/{pipelineId}/launch (step 2: launch config —
  # the launch fields live on a separate endpoint server-side and must
  # be merged in on Read for `pipeline_schema_id`, `params_text`, and
  # the pre/post-run scripts to round-trip correctly.)
  - target: $.paths["/pipelines/{pipelineId}/launch"].get
    update:
      x-speakeasy-entity-operation:
        terraform-datasource: null

        terraform-resource: Pipeline#read#2

  # UPDATE - PUT /pipelines/{pipelineId}
  - target: $.paths["/pipelines/{pipelineId}"].put
    update:
      x-speakeasy-entity-operation:
        terraform-datasource: null

        terraform-resource: Pipeline#update

  # DELETE - DELETE /pipelines/{pipelineId}
  - target: $.paths["/pipelines/{pipelineId}"].delete
    update:
      x-speakeasy-entity-operation:
        terraform-datasource: null

        terraform-resource: Pipeline#delete

  # ============================================================================
  # FIELD VALIDATORS
  # ============================================================================

  # Pipeline name must contain a minimum of 2 and a maximum of 99 alphanumeric
  # characters separated by dashes, dots or underscores
  - target: $.components.schemas.PipelineCreateRequest.properties.name
    update:
      title: "Pipeline Name"
      description: "Pipeline name must contain a minimum of 2 and a maximum of 99 alphanumeric characters separated by dashes, dots or underscores"
      example: "rna-seq-analysis"
      x-speakeasy-plan-validators: PipelineNameValidator
      x-speakeasy-param-optional: false

  - target: $.components.schemas.UpdatePipelineRequest.properties.name
    update:
      title: "Pipeline Name"
      description: "Pipeline name must contain a minimum of 2 and a maximum of 99 alphanumeric characters separated by dashes, dots or underscores"
      example: "rna-seq-analysis"
      x-speakeasy-plan-validators: PipelineNameValidator

  # Work directory format validation - must start with s3://, gs://, az://, or /
  # Also rejects trailing slashes to prevent plan diffs (API strips them at launch time)
  - target: $.components.schemas.WorkflowLaunchRequest.properties.workDir
    update:
      title: "Working Directory"
      description: >-
        Working directory for pipeline execution. Must start with a valid cloud storage
        prefix (s3://, gs://, az://) or be an absolute local path (/). Do not include
        a trailing slash — the API strips trailing slashes at launch time, which causes
        plan diffs. Required for pipelines in private workspaces and personal context;
        optional for shared workspaces. You can reference the work_dir from your compute
        environment instead of duplicating the value, e.g.
        seqera_compute_env.my_ce.compute_env.config.aws_batch.work_dir or
        seqera_aws_batch_compute_env.my_ce.config.work_dir.
      example: "s3://my-bucket/work"
      x-speakeasy-plan-validators: WorkDirFormatValidator

  # ============================================================================
  # FIELD CONFIGURATION
  # ============================================================================

  # Make workspaceId required across all pipeline operations (workspace-scoped only)
  - target: $.paths["/pipelines/{pipelineId}"].get.parameters[?(@.name == "workspaceId")]
    update:
      name: workspaceId
      in: query
      description: Workspace numeric identifier
      required: true
      schema:
        type: integer
        format: int64
  - target: $.paths["/pipelines"].post.parameters[?(@.name == "workspaceId")]
    update:
      required: true
  - target: $.paths["/pipelines/{pipelineId}"].put.parameters[?(@.name == "workspaceId")]
    update:
      required: true
  - target: $.paths["/pipelines/{pipelineId}"].delete.parameters[?(@.name == "workspaceId")]
    update:
      required: true

  # Remove required fields from WorkflowLaunchRequest to make them optional
  # This allows pipelines to be created without specifying compute env and work dir
  - target: $.components.schemas.WorkflowLaunchRequest
    update:
      required: [pipeline]

  # Make workDir optional in WorkflowLaunchRequest
  - target: $.components.schemas.WorkflowLaunchRequest.properties.workDir
    update:
      x-speakeasy-param-optional: true

  # Make computeEnvId optional in WorkflowLaunchRequest
  - target: $.components.schemas.WorkflowLaunchRequest.properties.computeEnvId
    update:
      x-speakeasy-param-optional: true

  # Remove-is-silent fix: Optional+Computed attributes inherit prior state
  # when the config value is null, so deleting one from config plans "no
  # changes". These fields are stored and echoed verbatim by the API, so
  # plain Optional is correct — omitting a field on update clears it
  # server-side. The extension must be set on BOTH the request schema and
  # the Read#2 response schema (LaunchDbDto), or the merged entity
  # attribute stays Computed. Deliberately NOT un-computed
  # (server-managed/defaulted): computeEnv, launchContainer,
  # optimizationId/Targets, resumeLaunchId, sessionId, workspaceId,
  # syntaxParser.
  - target: $.components.schemas.WorkflowLaunchRequest.properties.paramsText
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.paramsText
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.revision
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.revision
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.configText
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.configText
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.towerConfig
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.towerConfig
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.preRunScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.preRunScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.postRunScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.postRunScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.mainScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.mainScript
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.entryName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.entryName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.schemaName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.schemaName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.runName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.runName
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.headJobCpus
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.headJobCpus
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.headJobMemoryMb
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.headJobMemoryMb
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.pipelineSchemaId
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.pipelineSchemaId
    update:
      x-speakeasy-param-computed: false
  # The three list fields cannot be plain Optional: the generated refresh
  # code maps a missing/null API list to an empty list (make([]T, 0)), so
  # an unset list comes back as [] and a null plan can never round-trip.
  # `default: []` is the mechanism — it generates listdefault.StaticValue
  # (which implies Computed+Optional), so removing e.g. config_profiles =
  # ["docker"] plans `-> []`, matching what refresh returns. Live-verified:
  # set → remove → re-add round-trips cleanly against the dev API.
  - target: $.components.schemas.WorkflowLaunchRequest.properties.configProfiles
    update:
      default: []
  - target: $.components.schemas.WorkflowLaunchRequest.properties.userSecrets
    update:
      default: []
  - target: $.components.schemas.WorkflowLaunchRequest.properties.workspaceSecrets
    update:
      default: []
  - target: $.components.schemas.WorkflowLaunchRequest.properties.workDir
    update:
      x-speakeasy-param-computed: false
  - target: $.components.schemas.LaunchDbDto.properties.workDir
    update:
      x-speakeasy-param-computed: false

  # The launch booleans (pullLatest, stubRun) are primitive `boolean` on
  # both the request DTO and the Launch entity: an omitted field coerces to
  # false on the way in and the API always echoes an explicit true/false.
  # They can never round-trip as null, so instead of un-computing them they
  # get `default: false` — Speakeasy generates a Terraform booldefault, so
  # removing e.g. `pull_latest = true` plans `true -> false`, which is
  # exactly what the backend will do.
  - target: $.components.schemas.WorkflowLaunchRequest.properties.pullLatest
    update:
      default: false
  - target: $.components.schemas.WorkflowLaunchRequest.properties.stubRun
    update:
      default: false

  # `resume` is a dead toggle through Terraform: Nextflow -resume needs the
  # prior session (WorkflowLaunchRequest.id + sessionId), and both are
  # stripped from the Terraform surface by overlays/workflows.yaml — so
  # resume=true flags a resume with no session attached and the run starts
  # fresh anyway. Resuming a failed run is an operational action (UI),
  # not declarative config. Ignored on both the request and the Read#2 echo
  # so the attribute disappears from seqera_workflows, seqera_pipeline.launch
  # and seqera_action.launch alike.
  - target: $.components.schemas.WorkflowLaunchRequest.properties.resume
    update:
      x-speakeasy-terraform-ignore: true
  - target: $.components.schemas.LaunchDbDto.properties.resume
    update:
      x-speakeasy-terraform-ignore: true

  # Rename provider field to avoid conflicts with Terraform provider keyword
  - target: $.components.schemas.PipelineInfo.properties.provider
    update:
      x-speakeasy-name-override: repositoryProvider

  # ============================================================================
  # SCHEMA DESCRIPTIONS
  # ============================================================================

  # PipelineDbDto field descriptions and ordering
  - target: $.components.schemas.PipelineDbDto.properties.pipelineId
    update:
      description: Unique numeric identifier for the pipeline
      x-speakeasy-param-ordering: 1

  - target: $.components.schemas.PipelineDbDto.properties.name
    update:
      description: Display name for the pipeline
      x-speakeasy-param-ordering: 2

  - target: $.components.schemas.PipelineDbDto.properties.description
    update:
      description: Detailed description of the pipeline's purpose and functionality
      x-speakeasy-param-ordering: 3

  - target: $.components.schemas.PipelineDbDto.properties.repository
    update:
      description: Git repository URL containing the pipeline source code
      x-speakeasy-param-ordering: 4

  - target: $.components.schemas.PipelineDbDto.properties.icon
    update:
      description: Icon identifier or URL for visual representation
      x-speakeasy-param-ordering: 5

  # Note: userLastName is removed in the cleanup section; userId/userName/
  # userFirstName are kept (the seqera_pipeline data source exposes them as
  # creator attribution) and suppress-computed-diff'd in the READ-ONLY
  # FIELDS section below.

  # ============================================================================
  # READ-ONLY FIELDS
  # ============================================================================

  # Mark server-managed ID field as read-only in PipelineDbDto.
  # Immutable after create, so suppress the "(known after apply)" flip on
  # in-place updates (matches the `id` alias below).
  - target: $.components.schemas.PipelineDbDto.properties.pipelineId
    update:
      x-speakeasy-param-readonly: true
      x-speakeasy-param-suppress-computed-diff: true

  # Run-specific / server-managed launch fields that are always null or
  # immutable on a TEMPLATE launch: keep them from flipping to
  # "(known after apply)" on every in-place update.
  - target: $.components.schemas.LaunchDbDto.properties.launchContainer
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.LaunchDbDto.properties.optimizationId
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.LaunchDbDto.properties.optimizationTargets
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.LaunchDbDto.properties.resumeLaunchId
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.LaunchDbDto.properties.sessionId
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.LaunchDbDto.properties.workspaceId
    update:
      x-speakeasy-param-suppress-computed-diff: true

  # Add a parallel `id` attribute that aliases `pipelineId` so users can
  # reference the pipeline with the conventional `seqera_pipeline.foo.id`
  # alongside the existing `pipeline_id`. The jq transform-from-api
  # copies pipelineId into a synthetic `id` on deserialization — the
  # wire format stays `pipelineId` (no backend change) and existing
  # state keeps its `pipeline_id` attribute (no state upgrader needed).
  - target: $.components.schemas.PipelineDbDto
    update:
      x-speakeasy-transform-from-api:
        jq: ". + { id: .pipelineId }"
      properties:
        id:
          type: integer
          format: int64
          description: Alias of `pipeline_id` for Terraform convention.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true

  # ============================================================================
  # REQUEST EXAMPLES
  # ============================================================================

  # Provide realistic examples for PipelineCreateRequest documentation
  - target: $.components.schemas.PipelineCreateRequest.properties.description
    update:
      example: "RNA sequencing analysis pipeline for differential gene expression"

  - target: $.components.schemas.PipelineCreateRequest.properties.repository
    update:
      example: "https://github.com/myorg/rna-seq-pipeline"

  # ============================================================================
  # CLEANUP - Remove transient and runtime fields
  # ============================================================================

  # Remove user information fields (already readonly, but should not be in schema)
  - target: $.components.schemas.PipelineDbDto.properties.userLastName
    remove: true

  # Creator-attribution fields are kept (the seqera_pipeline data source
  # exposes them usefully) but suppressed on the resource: pipeline.user is
  # set at creation and never reassigned by updatePipeline, so propagating
  # prior state instead of "(known after apply)" is always correct.
  - target: $.components.schemas.PipelineDbDto.properties.userId
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.PipelineDbDto.properties.userName
    update:
      x-speakeasy-param-suppress-computed-diff: true
  - target: $.components.schemas.PipelineDbDto.properties.userFirstName
    update:
      x-speakeasy-param-suppress-computed-diff: true

  # Remove runtime organizational context fields
  - target: $.components.schemas.PipelineDbDto.properties.orgId
    remove: true
  - target: $.components.schemas.PipelineDbDto.properties.orgName
    remove: true
  - target: $.components.schemas.PipelineDbDto.properties.workspaceName
    remove: true

  # Remove internal deletion flag
  - target: $.components.schemas.PipelineDbDto.properties.deleted
    remove: true

  # Remove timestamp fields
  - target: $.components.schemas.PipelineDbDto.properties.lastUpdated
    remove: true

  # Remove runtime optimization data
  - target: $.components.schemas.PipelineDbDto.properties.optimizationId
    remove: true
  - target: $.components.schemas.PipelineDbDto.properties.optimizationTargets
    remove: true
  - target: $.components.schemas.PipelineDbDto.properties.optimizationStatus
    remove: true

  # Remove runtime label associations (managed separately)
  - target: $.components.schemas.PipelineDbDto.properties.labels
    remove: true

  # Remove expanded compute environment reference (use computeEnvId instead)
  - target: $.components.schemas.PipelineDbDto.properties.computeEnv
    remove: true

  # Same for the launch template echo (read#2): the full ComputeEnv object
  # duplicates what the compute-env resources manage and dominates plan
  # output whenever the referenced CE changes (the whole config/forge tree
  # flips to "known after apply"). launch.compute_env_id is the input;
  # affects seqera_pipeline and seqera_action (both read via LaunchDbDto).
  # terraform-ignore (not remove) keeps the field in the SDK models — only
  # the Terraform schema drops it. The extension is dropped if left as a
  # $ref sibling, so unwrap into allOf.
  - target: $["components"]["schemas"]["LaunchDbDto"]["properties"]["computeEnv"]["$ref"]
    remove: true
  - target: $.components.schemas.LaunchDbDto.properties.computeEnv
    update:
      allOf:
        - $ref: "#/components/schemas/ComputeEnv_ComputeConfig_"
      x-speakeasy-terraform-ignore: true

  # Remove computed/inherited field
  - target: $.components.schemas.PipelineDbDto.properties.visibility
    remove: true

  # Remove computed repository information from PipelineInfo
  # These fields are discovered from the git repository, not user-provided
  - target: $.components.schemas.PipelineInfo.properties.projectName
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.simpleName
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.repositoryUrl
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.cloneUrl
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.configFiles
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.workDirs
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.revisions
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.profiles
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.manifest
    remove: true
  - target: $.components.schemas.PipelineInfo.properties.warnings
    remove: true

  # TODO - Review once pipeline versioning goes live
  - target: $.components.schemas.PipelineDbDto.properties.commitId
    remove: true
  - target: $.components.schemas.LaunchDbDto.properties.commitId
    remove: true
