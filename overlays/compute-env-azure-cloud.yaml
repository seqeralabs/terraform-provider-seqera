overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Azure Cloud Compute Environment Overlay
  version: 0.0.1

# ==============================================================================
# AZURE CLOUD COMPUTE ENVIRONMENT RESOURCE OVERLAY
# ==============================================================================
#
# Defines the `seqera_azure_cloud_ce` resource — the Azure Cloud platform
# parallel of `seqera_aws_cloud_ce` (planned) and `seqera_gcp_cloud_ce`.
# Splits Azure Cloud out of the generic `seqera_compute_env` resource into
# its own first-class entity.
#
# Field-level descriptions for `AzCloudConfig` live in
# `overlays/compute-env.yaml` (shared with the generic resource); this overlay
# only adds the entity, the path operations, and resource-level annotations.
#
# TERRAFORM EXAMPLE:
# ------------------
#
# resource "seqera_azure_cloud_ce" "basic" {
#   name           = "azure-cloud-basic"
#   workspace_id   = 123
#   platform       = "azure-cloud"
#   credentials_id = seqera_azure_credential.main.credentials_id
#
#   config = {
#     region          = "eastus"
#     work_dir        = "az://my-container/work"
#     subscription_id = "00000000-0000-0000-0000-000000000000"
#     resource_group  = "my-resource-group"
#     instance_type   = "Standard_D4s_v3"
#   }
# }
#
# ==============================================================================

actions:
  - target: $.paths
    update:
      "/compute-envs#azure-cloud":
        post:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureCloudCE#create
          x-speakeasy-name-override: CreateAzureCloudCE
          summary: Create Azure Cloud compute environment
          description: Creates a new Azure Cloud compute environment. Append `?workspaceId` to create the environment in a workspace context.
          x-speakeasy-retries:
            strategy: backoff
            backoff:
              initialInterval: 5000
              maxInterval: 5000
              maxElapsedTime: 30000
              exponent: 1.0
            statusCodes:
              - 429
              - 500
              - 502
              - 503
              - 504
          tags:
            - compute-envs
          operationId: CreateAzureCloudCE
          parameters:
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
          requestBody:
            description: Azure Cloud compute environment create request
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CreateAzureCloudCERequest"
            required: true
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/CreateAzureCloudCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "409":
              description: Conflict - resource already exists
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []

      "/compute-envs/{computeEnvId}#azure-cloud":
        get:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureCloudCE#read
          x-speakeasy-name-override: DescribeAzureCloudCE
          summary: Describe Azure Cloud compute environment
          description: Retrieves the details of the Azure Cloud compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DescribeAzureCloudCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
              required: true
            - name: attributes
              in: query
              description: "Additional attribute values to include in the response (`labels`). Returns an empty value (`labels: null`) if omitted."
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComputeEnvQueryAttribute"
          responses:
            "200":
              description: OK
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/DescribeAzureCloudCEResponse"
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
            "404":
              description: Compute environment not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
          security:
            - BearerAuth: []
        delete:
          x-speakeasy-entity-operation:
            terraform-datasource: null
            terraform-resource: AzureCloudCE#delete
          x-speakeasy-name-override: DeleteAzureCloudCE
          summary: Delete Azure Cloud compute environment
          description: Deletes the Azure Cloud compute environment identified by the given `computeEnvId`.
          tags:
            - compute-envs
          operationId: DeleteAzureCloudCE
          parameters:
            - name: computeEnvId
              in: path
              description: Compute environment string identifier
              required: true
              schema:
                type: string
            - name: workspaceId
              in: query
              description: Workspace numeric identifier
              required: true
              schema:
                type: integer
                format: int64
          responses:
            "204":
              description: OK - No content
            "400":
              description: Bad request
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ErrorResponse"
            "403":
              description: Operation not allowed
          security:
            - BearerAuth: []

  - target: $.components.schemas
    update:
      # Azure Cloud compute environment schema
      AzureCloudCE_ComputeConfig:
        x-speakeasy-entity: AzureCloudCE
        x-speakeasy-entity-version: 1
        x-speakeasy-entity-description: |
          Manage Azure Cloud compute environments in Seqera platform.

          Azure Cloud compute environments execute Nextflow pipelines directly on
          Azure VMs managed by Seqera. Use this resource for long-running or
          interactive workloads where Seqera provisions and manages the underlying
          compute instances directly (rather than via Azure Batch).
        required:
          - config
          - name
          - platform
          - credentialsId
        type: object
        properties:
          credentialsId:
            type: string
            description: Azure credentials identifier
          orgId:
            type: integer
            format: int64
            readOnly: true
            x-speakeasy-param-readonly: true
          workspaceId:
            type: integer
            format: int64
            description: Workspace numeric identifier
          id:
            type: string
            description: Unique identifier for the compute environment
            x-speakeasy-param-readonly: true
          name:
            maxLength: 100
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
            description: A unique name for this compute environment. Use only alphanumeric, dash, and underscore characters.
            x-speakeasy-param-force-new: true
          description:
            type: string
            description: Optional description of the compute environment
            x-speakeasy-param-computed: false
          platform:
            type: string
            enum:
              - azure-cloud
            description: Azure platform type
            x-speakeasy-param-optional: false
          status:
            type: string
            description: Compute environment status
            x-speakeasy-param-readonly: true
          dateCreated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was created
            x-speakeasy-param-readonly: true
          lastUpdated:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last updated
            x-speakeasy-param-readonly: true
          lastUsed:
            type: string
            format: date-time
            description: Timestamp when the compute environment was last used
            x-speakeasy-param-readonly: true
          deleted:
            type: boolean
            description: Flag indicating if the compute environment has been deleted
            x-speakeasy-param-readonly: true
          config:
            description: Azure Cloud compute environment configuration
            $ref: '#/components/schemas/AzCloudConfig'

      # Azure Cloud request/response schemas
      CreateAzureCloudCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureCloudCE_ComputeConfig'
          labelIds:
            type: array
            items:
              type: integer
              format: int64

      CreateAzureCloudCEResponse:
        type: object
        properties:
          computeEnvId:
            type: string

      UpdateAzureCloudCERequest:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureCloudCE_ComputeConfig'

      DescribeAzureCloudCEResponse:
        type: object
        properties:
          computeEnv:
            $ref: '#/components/schemas/AzureCloudCE_ComputeConfig'

      ListAzureCloudCEsResponse:
        type: object
        properties:
          computeEnvs:
            type: array
            items:
              $ref: '#/components/schemas/AzureCloudCE_ComputeConfig'
          totalSize:
            type: integer
            format: int64

  # ============================================================================
  # FORCE-REPLACEMENT ON TOP-LEVEL FIELDS
  # ============================================================================
  # NOTE: name field does NOT have force-new — it can be updated in-place.
  # All other top-level fields force replacement on change.

  - target: $.components.schemas.AzureCloudCE_ComputeConfig.properties.description
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureCloudCE_ComputeConfig.properties.platform
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureCloudCE_ComputeConfig.properties.credentialsId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureCloudCE_ComputeConfig.properties.workspaceId
    update:
      x-speakeasy-param-force-new: true
  - target: $.components.schemas.AzureCloudCE_ComputeConfig.properties.config
    update:
      x-speakeasy-param-force-new: true
