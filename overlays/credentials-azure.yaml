overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Azure Credentials Overlay
  version: 0.0.0
actions:
- target: $.paths
  update:
    /credentials#azure:
      post:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCredential#create
        x-speakeasy-name-override: CreateAzureCredentials
        summary: Create Azure credentials
        description: Creates new Azure credentials in a user context. Append `?workspaceId` to create the credentials in a
          workspace context.
        tags:
        - credentials
        operationId: CreateAzureCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAzureCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateAzureCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#azure:
      get:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCredential#read
        x-speakeasy-name-override: DescribeAzureCredentials
        summary: Describe Azure credentials
        description: Retrieves the details of the Azure credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeAzureCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeAzureCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCredential#update
        x-speakeasy-name-override: UpdateAzureCredentials
        summary: Update Azure credentials
        description: Updates the details of the Azure credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateAzureCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAzureCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureCredential#delete
        x-speakeasy-name-override: DeleteAzureCredentials
        summary: Delete Azure credentials
        description: Deletes the Azure credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteAzureCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        - name: checked
          in: query
          description: If set credentials deletion will be blocked by running jobs that depend on them
          schema:
            type: boolean
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Running jobs block the deletion of this credentials
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteCredentialsConflictResponse'
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    AzureCredential:
      x-speakeasy-entity: AzureCredential
      x-speakeasy-entity-version: 1
      x-speakeasy-entity-description: |
        Manage Azure Batch credentials using shared-key authentication.
        This is the credential type required for Azure Batch compute
        environments in Forge mode.

        For other Azure credential types, use a dedicated typed resource:

        - **Azure Batch with Entra service principal**: `seqera_azure_entra_credential`
        - **Azure Cloud (SingleVM) with Entra service principal**: `seqera_azure_cloud_credential`

        The `tenant_id`, `client_id`, and `client_secret` fields are kept
        for backwards compatibility with earlier provider releases but
        have no effect on this credential type. Use the typed resources
        above for service-principal credentials so they surface in the
        correct compute-environment picker.
      x-speakeasy-transform-from-api:
        jq: '. + { batch_name: .keys.batchName, storage_name: .keys.storageName, batch_key: .keys.batchKey, storage_key: .keys.storageKey, tenant_id: .keys.tenantId, client_id: .keys.clientId, client_secret: .keys.clientSecret, credentials_id: .id } | del(.keys)'
      x-speakeasy-transform-to-api:
        jq: '. + { keys: { discriminator: "azure", batchName: .batch_name, storageName: .storage_name, batchKey: .batch_key, storageKey: .storage_key, tenantId: .tenant_id, clientId: .client_id, clientSecret: .client_secret } } | del(.batch_name, .storage_name, .batch_key, .storage_key, .tenant_id, .client_id, .client_secret, .credentials_id)'
      required:
      - name
      - batch_name
      - storage_name
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentials_id:
          type: string
          description: Alias of `id`. Retained for backwards compatibility with existing customer HCL — both fields hold the same value.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - azure
          default: azure
          description: Cloud provider type. Always set by the provider for this resource.
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        batch_name:
          type: string
          description: Azure Batch account name (required)
          example: myazurebatch
          x-speakeasy-param-computed: false
        storage_name:
          type: string
          description: Azure Blob Storage account name (required)
          example: myazurestorage
          x-speakeasy-param-computed: false
        batch_key:
          type: string
          description: Azure Batch account key (for shared key authentication)
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: YourAzureBatchAccountKeyHere==
          x-speakeasy-plan-validators: AzureCredentialSharedKeyValidator
        storage_key:
          type: string
          description: Azure Storage account key (for shared key authentication)
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: YourAzureStorageAccountKeyHere==
          x-speakeasy-plan-validators: AzureCredentialSharedKeyValidator
        tenant_id:
          type: string
          description: Azure tenant ID (for Entra/Cloud authentication)
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
          x-speakeasy-plan-validators: AzureCredentialEntraValidator
        client_id:
          type: string
          description: Azure service principal client ID (for Entra/Cloud authentication)
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
          x-speakeasy-plan-validators: AzureCredentialEntraValidator
        client_secret:
          type: string
          description: Azure service principal client secret (for Entra/Cloud authentication)
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: YourAzureClientSecretHere
          x-speakeasy-plan-validators: AzureCredentialEntraValidator
    CreateAzureCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCredential'
    CreateAzureCredentialsResponse:
      type: object
      properties:
        credentialsId:
          type: string
    UpdateAzureCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCredential'
    DescribeAzureCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AzureCredential'
- target: $.components.schemas.AzureCredential.properties.description
  remove: true
- target: $.components.schemas.AzureCredential.properties.baseUrl
  remove: true
- target: $.components.schemas.AzureCredential.properties.category
  remove: true
- target: $["paths"]["/credentials/{credentialsId}#azure"]["delete"]["parameters"][?(@.name == "checked")]
  remove: true
- target: $.components.schemas.AzureCredential.properties.batch_key
  update:
    writeOnly: true
- target: $.components.schemas.AzureCredential.properties.storage_key
  update:
    writeOnly: true
- target: $.components.schemas.AzureCredential.properties.tenant_id
  update:
    writeOnly: true
- target: $.components.schemas.AzureCredential.properties.client_id
  update:
    writeOnly: true
- target: $.components.schemas.AzureCredential.properties.client_secret
  update:
    writeOnly: true
- target: $["paths"]["/credentials#azure"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
