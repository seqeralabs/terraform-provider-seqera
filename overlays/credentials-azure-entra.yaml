overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Azure Entra Credentials Overlay
  version: 0.0.0
actions:
- target: $.paths
  update:
    /credentials#azure-entra:
      post:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureEntraCredential#create
        x-speakeasy-name-override: CreateAzureEntraCredentials
        summary: Create Azure Entra credentials
        description: Creates new Azure Batch credentials authenticating via an Entra service principal in a workspace.
        tags:
        - credentials
        operationId: CreateAzureEntraCredentials
        parameters:
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure Entra credentials create request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAzureEntraCredentialsRequest'
          required: true
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateAzureEntraCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Conflict - resource already exists
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
    /credentials/{credentialsId}#azure-entra:
      get:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureEntraCredential#read
        x-speakeasy-name-override: DescribeAzureEntraCredentials
        summary: Describe Azure Entra credentials
        description: Retrieves the details of the Azure Entra credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DescribeAzureEntraCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DescribeAzureEntraCredentialsResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '404':
            description: Not Found - Credential does not exist or has been deleted
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
        security:
        - BearerAuth: []
      put:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureEntraCredential#update
        x-speakeasy-name-override: UpdateAzureEntraCredentials
        summary: Update Azure Entra credentials
        description: Updates the details of the Azure Entra credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: UpdateAzureEntraCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        requestBody:
          description: Azure Entra credentials update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateAzureEntraCredentialsRequest'
          required: true
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
        security:
        - BearerAuth: []
      delete:
        x-speakeasy-entity-operation:

          terraform-datasource: null

          terraform-resource: AzureEntraCredential#delete
        x-speakeasy-name-override: DeleteAzureEntraCredentials
        summary: Delete Azure Entra credentials
        description: Deletes the Azure Entra credentials identified by the given `credentialsId`.
        tags:
        - credentials
        operationId: DeleteAzureEntraCredentials
        parameters:
        - name: credentialsId
          in: path
          description: Credentials string identifier
          required: true
          schema:
            type: string
        - name: workspaceId
          in: query
          description: Workspace numeric identifier
          required: true
          schema:
            type: integer
            format: int64
        responses:
          '204':
            description: OK - No content
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Operation not allowed
          '409':
            description: Running jobs block the deletion of this credentials
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/DeleteCredentialsConflictResponse'
        security:
        - BearerAuth: []
- target: $.components.schemas
  update:
    AzureEntraCredential:
      x-speakeasy-entity: AzureEntraCredential
      x-speakeasy-entity-version: 1
      x-speakeasy-terraform-resource-name: azure_entra_credential
      x-speakeasy-entity-description: |
        Manage Azure Batch credentials authenticated via a Microsoft Entra
        service principal. Use this credential type for Azure Batch compute
        environments configured in manual mode — Forge mode requires
        shared-key credentials via `seqera_azure_credential`.

        For Azure Cloud (SingleVM) CEs, use `seqera_azure_cloud_credential`
        instead.
      x-speakeasy-transform-from-api:
        jq: '. + { batch_name: .keys.batchName, storage_name: .keys.storageName, tenant_id: .keys.tenantId, client_id: .keys.clientId, client_secret: .keys.clientSecret, credentials_id: .id } | del(.keys)'
      x-speakeasy-transform-to-api:
        jq: '. + { keys: { discriminator: "azure_entra", batchName: .batch_name, storageName: .storage_name, tenantId: .tenant_id, clientId: .client_id, clientSecret: .client_secret } } | del(.batch_name, .storage_name, .tenant_id, .client_id, .client_secret, .credentials_id)'
      required:
      - name
      - batch_name
      - storage_name
      - tenant_id
      - client_id
      - client_secret
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the credential (max 22 characters)
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentials_id:
          type: string
          description: Alias of `id`. Retained for backwards compatibility with existing customer HCL — both fields hold the same value.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        name:
          minLength: 2
          maxLength: 99
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          description: Display name for the credential. Must be 2-99 characters using only letters, numbers, underscores, and hyphens. No spaces allowed.
          x-speakeasy-param-force-new: true
        provider:
          type: string
          enum:
          - azure_entra
          default: azure_entra
          description: Cloud provider type. Always set by the provider for this resource.
          x-speakeasy-name-override: providerType
          x-speakeasy-param-readonly: true
        deleted:
          type: boolean
          description: Flag indicating if the credential has been soft-deleted
          x-speakeasy-param-readonly: true
          x-speakeasy-param-computed: true
          x-speakeasy-terraform-ignore: true
        lastUsed:
          type: string
          format: date-time
          description: Timestamp when the credential was last used
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        dateCreated:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        lastUpdated:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
          x-speakeasy-param-readonly: true
          x-speakeasy-terraform-ignore: true
        batch_name:
          type: string
          description: Azure Batch account name.
          example: myazurebatch
          x-speakeasy-param-computed: false
        storage_name:
          type: string
          description: Azure Blob Storage account name.
          example: myazurestorage
          x-speakeasy-param-computed: false
        tenant_id:
          type: string
          description: Microsoft Entra tenant ID.
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
        client_id:
          type: string
          description: Microsoft Entra service principal client (application) ID.
          example: 00000000-0000-0000-0000-000000000000
          x-speakeasy-param-computed: false
        client_secret:
          type: string
          description: Microsoft Entra service principal client secret.
          x-speakeasy-param-sensitive: true
          x-speakeasy-terraform-write-only: true
          example: YourEntraClientSecretHere
    CreateAzureEntraCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureEntraCredential'
    CreateAzureEntraCredentialsResponse:
      type: object
      x-speakeasy-transform-from-api:
        jq: '. + { id: .credentialsId }'
      properties:
        id:
          type: string
          description: Alias of `credentials_id` for Terraform convention.
          x-speakeasy-param-readonly: true
          x-speakeasy-param-suppress-computed-diff: true
        credentialsId:
          type: string
    UpdateAzureEntraCredentialsRequest:
      type: object
      required:
      - credentials
      properties:
        credentials:
          $ref: '#/components/schemas/AzureEntraCredential'
    DescribeAzureEntraCredentialsResponse:
      type: object
      properties:
        credentials:
          $ref: '#/components/schemas/AzureEntraCredential'
- target: $.components.schemas.AzureEntraCredential.properties.description
  remove: true
- target: $.components.schemas.AzureEntraCredential.properties.baseUrl
  remove: true
- target: $.components.schemas.AzureEntraCredential.properties.category
  remove: true
- target: $.components.schemas.AzureEntraCredential.properties.client_secret
  update:
    writeOnly: true
- target: $["paths"]["/credentials#azure-entra"]["post"]["parameters"][?(@.name == "workspaceId")]
  update:
    x-speakeasy-param-force-new: true
